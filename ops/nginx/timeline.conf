# ops/nginx/timeline.conf
#
# Timeline public reel — Nginx vhost with proxy_cache for the public surface.
#
# Phase 7 commits this file to the repo. Phase 8 symlinks it into
# /etc/nginx/conf.d/ on the OCI VM (D-19). TLS configuration is delegated to
# the Phase 8 certbot run — this file intentionally omits the HTTPS port
# directive and the certificate-path directives (certbot's --nginx installer
# plugin appends them, or a deploy-time include adds them).
#
# Invalidation strategy: TTL-only, 5-minute windows (D-20).
# Cache key: $scheme$host$uri — no Vary header (D-21). English-only v1, locked.
#
# References:
#   - .planning/phases/07-public-urls-handle/07-CONTEXT.md §"Nginx cache" (D-18..D-21)
#   - .planning/phases/07-public-urls-handle/07-RESEARCH.md §"Pattern 7"
#   - server/routes/publicReel.ts — app-layer Cache-Control headers (300/60)
#   - server/routes/handlesCheck.ts — Cache-Control: no-store (NOT cached here)

# ---------------------------------------------------------------------------
# Cache zone declaration. Must live at the http{} level — Phase 8 places this
# file in conf.d/ which is included from http{} in nginx.conf, so this works.
# ---------------------------------------------------------------------------
proxy_cache_path /var/cache/nginx/public_reel
                 levels=1:2
                 keys_zone=public_reel:10m
                 max_size=1g
                 inactive=24h
                 use_temp_path=off;

# ---------------------------------------------------------------------------
# Upstream -- the API service in docker-compose.prod.yml binds to
# 127.0.0.1:8787 on the host loopback. server/env.ts:14 sets PORT default to
# 8787. This file's earlier placeholder (the dev port) was authored before
# Phase 8 set the loopback bind; it is updated here as the Phase 7 author
# pre-blessed.
# ---------------------------------------------------------------------------
upstream timeline_api {
    server 127.0.0.1:8787;
}

server {
    # Phase 8 / certbot added the 443 listen + SSL directives at the bottom
    # of this server block. The port-80 redirect lives in the separate
    # server block at the end of this file.
    server_name timeline.bryanlam.dev;

    # -----------------------------------------------------------------------
    # Public reel API — cached, no auth (07-02 mounts this OUTSIDE the JWT
    # middleware tree). Cache key is $scheme$host$uri — case-insensitive
    # handle lookup happens at the app layer, so /u/Bryan and /u/bryan are
    # different cache entries but return the same content. Acceptable
    # at-most-2x cache space per popular handle.
    # -----------------------------------------------------------------------
    location ~ ^/api/public/u/[^/]+$ {
        proxy_pass http://timeline_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache public_reel;
        proxy_cache_key $scheme$host$uri;
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;

        # X-No-Cache request header bypasses cache for a single request.
        # Reserved for future owner-active invalidation (v2 — D-20 says
        # TTL-only for v1; this directive ships now so v2 doesn't need a
        # second Nginx edit).
        proxy_cache_bypass $http_x_no_cache;

        # Serve stale during upstream error / timeout / lock-driven update.
        # Combined with proxy_cache_lock, only one request per key
        # revalidates upstream at a time.
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;

        # `always` is critical — without it, the header is omitted on 4xx/5xx
        # which defeats the debugging-on-404 use case.
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # -----------------------------------------------------------------------
    # Public SPA HTML — proxy to API (which serves dist/index.html via Hono
    # serveStatic SPA fallback). Cached via the public_reel zone with
    # case-preserving key so /u/Bryan and /u/bryan are separate entries
    # serving the same content (at-most-2x cache space per popular handle).
    #
    # Per RESEARCH §"Architecture Patterns" Pattern 1, dist/ lives INSIDE
    # the API container — nginx has no filesystem path to it. The Phase 7
    # try_files approach fell through to nginx's default root (the
    # "Welcome to nginx!" page), which is why this block now proxies.
    # -----------------------------------------------------------------------
    location ~ ^/u/[^/]+$ {
        proxy_pass http://timeline_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache public_reel;
        proxy_cache_key $scheme$host$uri;
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_bypass $http_x_no_cache;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;

        add_header X-Cache-Status $upstream_cache_status always;
    }

    # -----------------------------------------------------------------------
    # All other /api/* paths — pass through, NO proxy_cache.
    #
    # This catches:
    #   - /api/handles/check (Cache-Control: no-store from app — no caching
    #     needed; Nginx default also honors no-store)
    #   - /api/me, /api/cities, /api/photos (JWT-bearing — must never be
    #     cached; Authorization header forwarded)
    #   - /api/health (cheap; not worth caching)
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass http://timeline_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        # No proxy_cache here — auth-bearing routes pass through.
    }

    # -----------------------------------------------------------------------
    # Vite static assets -- hash-fingerprinted filenames (index-abc123.js) so
    # a one-year immutable cache is safe. Reduces repeat-visit bandwidth to
    # near-zero (RESEARCH Open Question 4 / Pitfall 9). Phase 7's
    # location / fallback caught these requests with no cache header.
    #
    # IMPORTANT: per RESEARCH §"Architecture Patterns" Pattern 1, the Vite
    # dist/ lives INSIDE the API container (Dockerfile runtime stage COPYs
    # from the builder stage). The API serves /assets/* via Hono `serveStatic`
    # mounted in server/index.ts (08-01 Task 1). Nginx is host-installed and
    # has NO filesystem path to /app/dist/, so we proxy_pass here and only
    # overlay cache headers on the response. A directive that tries the host
    # filesystem first against a non-existent path would 404 every asset request.
    # -----------------------------------------------------------------------
    location ~ ^/assets/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # -----------------------------------------------------------------------
    # SPA fallback for all other paths (/, /app, /app/*, deep links).
    # Proxy to API — Hono serveStatic + GET('*') fallback returns
    # dist/index.html for any unmatched path. No proxy_cache here: the
    # /app surface is authenticated SPA shell + may include
    # user-specific 4xx pages we don't want shared across visitors.
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://timeline_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/timeline.bryanlam.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/timeline.bryanlam.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = timeline.bryanlam.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name timeline.bryanlam.dev;
    return 404; # managed by Certbot


}

