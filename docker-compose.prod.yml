# Production override layered on top of docker-compose.yml.
# Compose merges by service key, so this file only declares the deltas:
#   - postgres: strip the dev port publish (D-11), restart=always.
#   - api: pulled from OCIR via image: ${OCIR_REGISTRY}/${OCIR_REPO}:${IMAGE_TAG}
#     (Phase 9 — was previously built locally via build: + VITE_* args).
#
# CI/CD invocation (.github/workflows/deploy.yml):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --env-file .env --env-file .env.tag pull api
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --env-file .env --env-file .env.tag run --rm api bun run db:migrate
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --env-file .env --env-file .env.tag up -d
#
# .env.tag MUST come AFTER .env in --env-file order — Compose treats later
# files as wins for duplicate keys (RESEARCH Pitfall 3).
#
# Manual local-build invocation (emergency fallback, still supported because
# docker-compose.yml has the build: in its own api service definition):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  postgres:
    # D-11: Postgres MUST NOT publish 5432 in production. The empty list
    # overrides the dev compose's `ports: ["5432:5432"]`. Postgres remains
    # reachable from the api container via Docker's internal network
    # (`postgres:5432` DNS).
    ports: []
    restart: always

  api:
    # Phase 9: image is pre-built by .github/workflows/deploy.yml and pushed
    # to OCIR. The deploy step writes IMAGE_TAG=vX.Y.Z to .env.tag on the VM
    # and invokes compose with `--env-file .env --env-file .env.tag` so
    # IMAGE_TAG (and OCIR_REGISTRY/OCIR_REPO) resolve at `compose pull` time.
    # See feedback_dual_runtime_env.md: VITE_* are inlined into dist/ at
    # build time IN THE GHA RUNNER (build-args), not here. They no longer
    # need to be passed as compose build-args because compose no longer builds.
    image: ${OCIR_REGISTRY}/${OCIR_REPO}:${IMAGE_TAG}
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://timeline:${POSTGRES_PASSWORD}@postgres:5432/timeline
      PORT: 8787
    # Loopback-only bind. Nginx (08-02) reverse-proxies from the host's
    # public 80/443 to 127.0.0.1:8787. Public attack surface in 08-01 = zero.
    ports:
      - "127.0.0.1:8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    volumes:
      # OCI PEM file (read-only). Container sees it at /app/.oci/<file>.pem.
      # OCI_PRIVATE_KEY_PATH in .env should point to that container-side path.
      - ./.oci:/app/.oci:ro
