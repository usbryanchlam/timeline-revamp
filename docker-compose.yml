services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: timeline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timeline_dev_pw}
      POSTGRES_DB: timeline
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timeline -d timeline"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
